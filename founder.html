<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>multi.net | Founders</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="founder.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body class="founder-page">
    <div id="trail-container"></div>

    <header>
        <div class="header-container">
            <h1 class="brand-text">founders</h1>
        </div>
    </header>

    <main class="founder-main">
        <div class="founder-grid">
            <!-- Ryan -->
            <div class="founder-card-wrapper">
                <div class="founder-card" id="card-ryan">
                    <div class="card-inner">
                        <div class="profile-img-container">
                            <img src="https://cdn.discordapp.com/avatars/1476095606475849729/b30b04687728a007693299cd7978f8ef.webp?size=1024"
                                alt="Ryan" class="profile-img">
                        </div>
                        <h2 class="founder-name">Ryan</h2>
                        <p class="founder-role">Lead Developer</p>
                        <div class="founder-socials">
                            <span class="social-tag">DEVELOPER</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Halzz -->
            <div class="founder-card-wrapper">
                <div class="founder-card" id="card-halzz">
                    <div class="card-inner">
                        <div class="profile-img-container">
                            <img src="https://cdn.discordapp.com/avatars/1444557898347974809/fa4e2787fa2fc6aeea7bfc8d46c4cd24.webp?size=1024"
                                alt="Halzz" class="profile-img">
                        </div>
                        <h2 class="founder-name">Halzz</h2>
                        <p class="founder-role">Main founder</p>
                        <div class="founder-socials">
                            <span class="social-tag">FOUNDER</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Kryp -->
            <div class="founder-card-wrapper">
                <div class="founder-card" id="card-kryp">
                    <div class="card-inner">
                        <div class="profile-img-container">
                            <img src="https://cdn.discordapp.com/avatars/1484151873886752878/f4774af380d492ef42e20eb32e59e9bd.webp?size=1024"
                                alt="Kryp" class="profile-img">
                        </div>
                        <h2 class="founder-name">Kryp</h2>
                        <p class="founder-role">Lead Developer</p>
                        <div class="founder-socials">
                            <span class="social-tag">DEVELOPER</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="founder.js"></script>
</body>

</html>
